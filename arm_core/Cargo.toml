[package]
name = "arm_core"
version = "0.1.0"
edition = "2024"

[dependencies]
arm_traits = { path = "../arm_traits" }
serde = { version = "1", default-features = false, features = ["derive", "alloc"]}
# openvm host dependencies
# openvm-circuit = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.1" }
# openvm-stark-sdk = { git = "https://github.com/openvm-org/stark-backend.git", tag = "v2.0.0-beta.1" }
#sha2 dependencies
openvm-sha2 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2"}
#keccak dependencies
sha3 = {version = "0.10", optional = true}
openvm-keccak256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", package = "openvm-keccak256", optional = true }
# ec dependencies
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"], optional = true}
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", optional = true}
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2" , optional = true}
openvm-k256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", package = "k256", optional = true }

thiserror = { version = "2.0.6", default-features = false }

[features]
default = ["host"]
host = ["dep:sha3", "dep:k256"]
guest = ["dep:openvm-keccak256", "dep:openvm-k256", "dep:openvm-algebra-guest", "dep:openvm-ecc-guest"]