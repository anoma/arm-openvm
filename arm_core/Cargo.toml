[package]
name = "arm_core"
version = "0.1.0"
edition = "2024"

[dependencies]
arm_traits = { path = "../arm_traits" }
serde = { version = "1", default-features = false, features = ["derive", "alloc"]}
# openvm host dependencies
# openvm-circuit = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.1" }
# openvm-stark-sdk = { git = "https://github.com/openvm-org/stark-backend.git", tag = "v2.0.0-beta.1" }
#sha2 dependencies
openvm-sha2 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2"}
#keccak dependencies
openvm-keccak256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", package = "openvm-keccak256"}
# ec dependencies
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2"}
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2"}
openvm-k256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", package = "k256"}
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"], optional = true }

thiserror = { version = "2.0.6", default-features = false }

[features]
default = ["host"]
host = ["dep:k256"]